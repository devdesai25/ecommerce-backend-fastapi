services:
  backend:
    build: ./backend
    container_name: backend
    ports: 
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload 
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    ports:
      - "5173:5173"
    volumes: 
    - ./frontend:/app
    - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    stdin_open: true
    tty: true